name: arcane_codex_web
description: "ArcaneCodex static documentation site"
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ^3.10.0

dependencies:
  web: ^1.1.1
  jaspr: ^0.22.3
  jaspr_content: ^0.5.0
  arcane_jaspr:
    path: ../../
  arcane_lexicon:
    path: ../../../arcane_inkwell
  fast_log: ^1.0.7

dev_dependencies:
  build_runner: ^2.11.1
  build_web_compilers: ^4.4.14
  jaspr_builder: ^0.22.3
  lints: ^6.1.0


jaspr:
  mode: static

scripts:
  # Development
  serve: jaspr serve
  serve_release: jaspr serve --release

  # Build
  build: jaspr build

  # Clean
  clean: jaspr clean

  # Kill running servers
  killall: pkill -f "jaspr serve" || true

  # Firebase Deployment (run from parent directory)
  firebase_deploy: jaspr build && cd .. && firebase deploy --only hosting --project FIREBASE_PROJECT_ID
